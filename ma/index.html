<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>JAPS Website</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    /* NAVBAR */
    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #0b3d91;
      padding: 10px 30px;
    }

    .logo img {
      width: 100px;
      border-radius: 50%;
    }
    .nav-links {
      display: flex;
      gap: 30px;

    }

    .nav-links a {
      color: white;
      text-decoration: none;
      font-size: 20px;
    }

    .nav-links a:hover {
      color: yellow;
    }

    /* HERO IMAGE */
    .hero img {
      width: 100%;
      height: 360px;    
    }

    /* FOOTER */
    .footer {
      background: #222;
      color: white;
      text-align: center;
      padding: 15px;
    }
  </style>
</head>
<body>

  <!-- NAVBAR -->
  <div class="navbar">
    <div class="logo">
      <img src="logo.jpg (1).jpeg" alt="Logo">
    </div>

    <div class="nav-links">
      <a href="#">Home</a>
      <a href="#">About</a>
      <a href="#">Admissions</a>
      <a href="#">Contact</a>
    </div>
  </div>
  <!-- HERO IMAGE -->
  <div class="hero">
    <img src="image.jpg.jpeg" alt="School Image">
  </div>
  <!-- FOOTER -->
  <div class="footer">
       <h1>Welcome to Jeejal Amaan Public School</h1>
    <p>Character | Competence | Quality</p>
  </div>
</body>
</html>
